apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api-deployment
  labels:
    app: portfolio-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-api
  template:
    metadata:
      labels:
        app: portfolio-api
    spec:
      containers:
      - name: portfolio-api
        image: portfolio-api:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          value: "postgresql://portfolio_user:portfolio_secure_password@portfolio-db-service:5432/portfolio_tracker_db"
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-api-service
spec:
  selector:
    app: portfolio-api
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
