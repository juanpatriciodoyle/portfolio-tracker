apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-db-deployment
  labels:
    app: portfolio-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-db
  template:
    metadata:
      labels:
        app: portfolio-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          value: portfolio_user
        - name: POSTGRES_PASSWORD
          value: portfolio_secure_password
        - name: POSTGRES_DB
          value: portfolio_tracker_db
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-db-service
spec:
  selector:
    app: portfolio-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP